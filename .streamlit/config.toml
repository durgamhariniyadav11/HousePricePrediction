# ─────────────────────────────────────────────
# Streamlit Server Configuration
# Used for both local and AWS EC2 deployment
# ─────────────────────────────────────────────

[server]
port = 8501
address = "0.0.0.0"
headless = true
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false

[theme]
primaryColor         = "#1a73e8"
backgroundColor      = "#f8f9fa"
secondaryBackgroundColor = "#ffffff"
textColor            = "#212121"
font                 = "sans serif"
